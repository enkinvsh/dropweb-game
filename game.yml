# dropweb-game — "Игровой" (Gaming) mode descriptor for the dropweb VPN app.
#
# WHAT THIS IS
#   One declarative file that turns on and configures the app's third routing
#   mode — "Игровой". The panel advertises it per-subscription via a custom
#   HTTP response header:
#
#       dropweb-game: https://raw.githubusercontent.com/enkinvsh/dropweb-game/main/game.yml
#
#   When the app sees that header it (1) reveals "Игровой" in the UI, (2) fetches
#   THIS file, (3) applies the patch below to the active Mihomo config. No app
#   release is needed to change behaviour — edit + push here, clients pick it up.
#
# ROUTING INTENT
#   Games + gaming-adjacent services (Discord / Twitch / YouTube) → VPN via a
#   low-latency Hysteria2 tunnel. Everything else → DIRECT (minimal ping; RU /
#   local traffic never detours).
#
# See README.md for the full schema, header setup, and operations.

version: 1

mode:
  id: gaming
  name: "Игровой"
  icon: gamepad
  # First app version that ships gaming-mode support. The app hides the mode
  # if it is older than this (forward-safe rollout). Bump to the real release.
  minAppVersion: "0.8.2"

# Hy2 proxy TEMPLATE — GENERIC params only. The actual node domains are NOT in
# this (public-safe) file. They arrive from the panel header `dropweb-game-nodes`
# (comma-separated region POOL domains, e.g. "pl.example.net,de.example.net"), so
# nothing about the infra is ever committed to this repo.
#
# For each domain D in `dropweb-game-nodes` the app builds a proxy:
#   { name: "🎮 "+D, type: hysteria2, server: D, sni: D,
#     password: <user's vlessUuid, app-filled>, port, alpn, skip-cert-verify }
# Hy2 auth == vlessUuid on Remnawave 2.7.4 (verified e2e). Hy2 uses a real LE
# cert, so each node's cert must SAN its pool domain — the certbot role already
# does (verified on a real node).
hysteria:
  template:
    port: 443
    alpn: ["h3"]
    skip-cert-verify: false

# The proxy-group gaming traffic routes to. Members = the injected Hy2 proxies.
# url-test = lowest-latency node (room for load-balance / multipath later).
group:
  name: "🎮 Gaming"
  type: url-test
  url: "https://cp.cloudflare.com/generate_204"
  interval: 60
  tolerance: 50

# Remote rule-set(s) the app registers before applying the rules below.
rule-providers:
  dropweb-games:
    type: http
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/legiz-ru/mihomo-rule-sets/main/other/games-direct.yaml"
    interval: 86400

# Routing applied ONLY in gaming mode. The app REPLACES the active rules with
# these (strictly gated to WorkMode.gaming; never touches other modes). Targets
# resolve to `group.name`. Ends with MATCH,DIRECT — anything unmatched stays
# direct. NB: applied as RULES — do NOT rely on mihomo `mode: global` (global
# ignores custom groups and falls back to DIRECT).
rules:
  # Route the game PROCESS itself → Hy2. Steam Datagram Relay (CS2/Dota
  # matchmaking + gameplay) is UDP to Valve relay IPs — IP-based, so the
  # GEOSITE domain rules below do NOT catch it; without this it falls to
  # MATCH,DIRECT and breaks behind the tun. PROCESS-NAME is desktop-only
  # (OS-specific, device-local): cs2.exe=Windows, cs2=macOS/Linux.
  - "PROCESS-NAME,cs2.exe,🎮 Gaming"
  - "PROCESS-NAME,cs2,🎮 Gaming"
  - "PROCESS-NAME,dota2.exe,🎮 Gaming"
  - "PROCESS-NAME,dota2,🎮 Gaming"
  - "PROCESS-NAME,r5apex.exe,🎮 Gaming"
  - "PROCESS-NAME,r5apex_dx12.exe,🎮 Gaming"
  - "GEOSITE,category-games,🎮 Gaming"
  - "GEOSITE,category-game-accelerator-cn,🎮 Gaming"
  - "RULE-SET,dropweb-games,🎮 Gaming"
  - "GEOSITE,discord,🎮 Gaming"
  - "GEOSITE,twitch,🎮 Gaming"
  - "GEOSITE,youtube,🎮 Gaming"
  - "MATCH,DIRECT"
